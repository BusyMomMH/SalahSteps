<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Salah Steps Audio</title>
</head>

<body style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:Arial;text-align:center;">

  <div id="status">Loading...</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const sound = params.get("sound");

    const audioMap = {
      takbeer: "01_takbeer.mp3",
      ruku: "02_ruku.mp3",
      sajda: "03_sajda.mp3",
      tashahhud: "04_tashahhud.mp3",
      dua: "06_dua.mp3"
    };

    const file = audioMap[sound];
    const status = document.getElementById("status");

    if (!file) {
      status.innerText = "Invalid QR code";
    } else {
      status.innerText = "Playing...";

      const audio = new Audio(file);
      let count = 0;

      audio.addEventListener("ended", () => {
        count++;
        if (count < 3) {
          audio.currentTime = 0;
          audio.play();
        } else {
          status.innerText = "Done ✔";
        }
      });

      audio.play().catch(() => {
        status.innerText = "Tap screen to play";
        document.body.addEventListener("click", () => audio.play(), { once: true });
      });
    }
  </script>

</body>
</html>
