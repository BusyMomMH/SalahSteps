<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Salah Trainer Kids</title>

<style>

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Arial Rounded MT Bold',sans-serif;
}

body{
    min-height:100vh;
    background:
    linear-gradient(135deg,#0f172a,#1e1b4b,#312e81);
    overflow-x:hidden;
    color:white;
    padding:20px;
}

.bg-bubbles{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:-1;
}

.bubble{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    animation:float 12s infinite linear;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(0.8);
    }
    to{
        transform:translateY(-120vh) scale(1.2);
    }
}

.container{
    max-width:650px;
    margin:auto;
}

.title{
    text-align:center;
    font-size:2.3rem;
    font-weight:bold;
    margin-bottom:10px;
    animation:pulse 2s infinite;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:25px;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.03);}
    100%{transform:scale(1);}
}

.grid{
    display:grid;
    gap:18px;
}

.tile{
    position:relative;
    overflow:hidden;
    border-radius:24px;
    padding:24px;
    cursor:pointer;
    transition:0.3s;
    border:3px solid transparent;
    backdrop-filter:blur(8px);
}

.tile:hover{
    transform:translateY(-5px) scale(1.02);
}

.tile.active{
    border-color:white;
    box-shadow:0 0 25px rgba(255,255,255,0.7);
}

.tile::before{
    content:"";
    position:absolute;
    width:180px;
    height:180px;
    border-radius:50%;
    top:-50px;
    right:-50px;
    background:rgba(255,255,255,0.18);
}

.tile h2{
    font-size:1.4rem;
    margin-bottom:8px;
    position:relative;
}

.tile p{
    position:relative;
    color:#f1f5f9;
    font-size:1rem;
}

.controls{
    margin-top:28px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

button{
    border:none;
    border-radius:18px;
    padding:16px;
    font-size:1rem;
    font-weight:bold;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.playBtn{background:#22c55e;}
.pauseBtn{background:#eab308;}
.stopBtn{background:#ef4444;}
.loopBtn{background:#3b82f6;}

.status{
    margin-top:20px;
    text-align:center;
    font-size:1rem;
    color:#f8fafc;
}

.footer{
    text-align:center;
    margin-top:16px;
    color:#cbd5e1;
    font-size:0.9rem;
}

audio{
    display:none;
}

</style>
</head>

<body>

<div class="bg-bubbles"></div>

<div class="container">

    <div class="title">
        ✨ Salah Trainer Kids ✨
    </div>

    <div class="subtitle">
        Scan QR • Tap Tile • Learn Salah
    </div>

    <div class="grid" id="tiles"></div>

    <div class="controls">
        <button class="playBtn" onclick="playAudio()">▶ Play</button>
        <button class="pauseBtn" onclick="pauseAudio()">⏸ Pause</button>
        <button class="stopBtn" onclick="stopAudio()">⏹ Stop</button>
        <button class="loopBtn" onclick="toggleLoop()">🔁 Loop: OFF</button>
    </div>

    <div class="status" id="status">
        READY
    </div>

    <div class="footer">
        Audio auto-starts after QR scan
    </div>

</div>

<audio id="audio" playsinline preload="auto"></audio>

<script>

const tracks = [

{
    title:"🌟 Takbeer",
    subtitle:"Allahu Akbar",
    file:"01_takbeer.mp3",
    color:"linear-gradient(135deg,#f97316,#fb7185)",
    repeat:1
},

{
    title:"💜 Ruku",
    subtitle:"Repeat 3 Times",
    file:"02_ruku.mp3",
    color:"linear-gradient(135deg,#8b5cf6,#6366f1)",
    repeat:3
},

{
    title:"💚 Sajda",
    subtitle:"Repeat 3 Times",
    file:"03_sajda.mp3",
    color:"linear-gradient(135deg,#10b981,#14b8a6)",
    repeat:3
},

{
    title:"☀️ Tashahhud",
    subtitle:"Finger Raised",
    file:"04_tashahhud.mp3",
    color:"linear-gradient(135deg,#f59e0b,#f97316)",
    repeat:1
},

{
    title:"🌈 Salam",
    subtitle:"Assalamu Alaikum",
    file:"05_salam.mp3",
    color:"linear-gradient(135deg,#ec4899,#8b5cf6)",
    repeat:1
},

{
    title:"🤲 Dua",
    subtitle:"Final Dua",
    file:"06_dua.mp3",
    color:"linear-gradient(135deg,#06b6d4,#3b82f6)",
    repeat:1
}

];

const tilesContainer=document.getElementById("tiles");
const audio=document.getElementById("audio");
const statusText=document.getElementById("status");

let currentTrack=null;
let loopMode=false;
let repeatCount=0;

tracks.forEach((track,index)=>{

    const tile=document.createElement("div");

    tile.className="tile";

    tile.style.background=track.color;

    tile.innerHTML=`
        <h2>${track.title}</h2>
        <p>${track.subtitle}</p>
    `;

    tile.onclick=()=>{

        loadTrack(track,index,true);

    };

    tilesContainer.appendChild(tile);

});

function clearActive(){

    document.querySelectorAll(".tile").forEach(tile=>{
        tile.classList.remove("active");
    });

}

function loadTrack(track,index,autoplay=false){

    clearActive();

    document.querySelectorAll(".tile")[index]
    .classList.add("active");

    currentTrack=track;

    repeatCount=0;

    audio.src=track.file + "?v=" + Date.now();

    audio.load();

    statusText.innerHTML=
    "Loaded: " + track.title;

    if(autoplay){

        const p=audio.play();

        if(p!==undefined){

            p.then(()=>{

                statusText.innerHTML=
                "Playing: " + track.title;

            }).catch(()=>{

                statusText.innerHTML=
                "Tap PLAY to start";

            });

        }

    }

}

audio.addEventListener("ended",()=>{

    if(!currentTrack) return;

    if(repeatCount < currentTrack.repeat - 1){

        repeatCount++;

        audio.currentTime=0;

        audio.play();

        statusText.innerHTML=
        currentTrack.title +
        " • Repeat " +
        (repeatCount+1) +
        "/" +
        currentTrack.repeat;

        return;

    }

    if(loopMode){

        repeatCount=0;

        audio.currentTime=0;

        audio.play();

        statusText.innerHTML=
        "Looping: " + currentTrack.title;

    }

});

function playAudio(){

    if(!currentTrack){

        statusText.innerHTML=
        "Select a Salah step";

        return;
    }

    audio.play();

}

function pauseAudio(){

    audio.pause();

    statusText.innerHTML="Paused";

}

function stopAudio(){

    audio.pause();

    audio.currentTime=0;

    repeatCount=0;

    statusText.innerHTML="Stopped";

}

function toggleLoop(){

    loopMode=!loopMode;

    document.querySelector(".loopBtn")
    .innerHTML=
    loopMode
    ? "🔁 Loop: ON"
    : "🔁 Loop: OFF";

}

function preloadAll(){

    tracks.forEach(track=>{

        const a=new Audio();

        a.src=track.file;

        a.preload="auto";

    });

}

preloadAll();

for(let i=0;i<18;i++){

    const bubble=document.createElement("div");

    bubble.className="bubble";

    bubble.style.left=Math.random()*100+"vw";

    bubble.style.width=
    bubble.style.height=
    (30+Math.random()*80)+"px";

    bubble.style.animationDuration=
    (8+Math.random()*10)+"s";

    bubble.style.opacity=Math.random();

    document.querySelector(".bg-bubbles")
    .appendChild(bubble);

}

const params=
new URLSearchParams(window.location.search);

const audioParam=params.get("audio");

if(audioParam){

    const found=
    tracks.find(t=>t.file===audioParam);

    if(found){

        const idx=
        tracks.findIndex(t=>t.file===audioParam);

        setTimeout(()=>{

            loadTrack(found,idx,true);

        },600);

    }

}

</script>

</body>
</html>
