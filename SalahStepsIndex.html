<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Salah Trainer Pro</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
}

.title{
    text-align:center;
    font-size:2rem;
    font-weight:bold;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:14px;
}

.tile{
    background:#1e293b;
    border-radius:18px;
    padding:18px;
    cursor:pointer;
    transition:0.25s;
    border:2px solid transparent;
    position:relative;
    overflow:hidden;
}

.tile:hover{
    transform:translateY(-2px);
    border-color:#38bdf8;
    box-shadow:0 0 18px rgba(56,189,248,0.5);
}

.tile.active{
    border-color:#22c55e;
    box-shadow:0 0 22px rgba(34,197,94,0.7);
}

.tile-title{
    font-size:1.15rem;
    font-weight:bold;
}

.tile-sub{
    margin-top:6px;
    color:#cbd5e1;
    font-size:0.92rem;
}

.controls{
    margin-top:24px;
    display:flex;
    gap:10px;
}

button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#2563eb;
    color:white;
    font-size:1rem;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#1d4ed8;
}

.status{
    margin-top:18px;
    text-align:center;
    color:#94a3b8;
    font-size:0.95rem;
}

.footer{
    margin-top:16px;
    text-align:center;
    color:#64748b;
    font-size:0.8rem;
}

.glow{
    position:absolute;
    width:120px;
    height:120px;
    background:rgba(56,189,248,0.15);
    border-radius:50%;
    top:-40px;
    right:-30px;
}

audio{
    display:none;
}
</style>
</head>

<body>

<div class="container">

    <div class="title">
        Salah Trainer Pro
    </div>

    <div class="grid" id="tiles"></div>

    <div class="controls">
        <button onclick="playAudio()">Play</button>
        <button onclick="pauseAudio()">Pause</button>
        <button onclick="stopAudio()">Stop</button>
    </div>

    <div class="status" id="status">
        READY
    </div>

    <div class="footer">
        Scan QR → Opens audio automatically
    </div>

</div>

<audio id="audio" playsinline preload="auto"></audio>

<script>

const tracks = [

{
    title:"1. Takbeer",
    subtitle:"Allahu Akbar",
    file:"01_takbeer.mp3"
},

{
    title:"2. Ruku",
    subtitle:"Subhana Rabbiyal Adheem",
    file:"02_ruku.mp3"
},

{
    title:"3. Sujood",
    subtitle:"Subhana Rabbiyal A'la",
    file:"03_sajda.mp3"
},

{
    title:"4. Tashahhud",
    subtitle:"Finger raised",
    file:"04_tashahhud.mp3"
},

{
    title:"5. Salam",
    subtitle:"Assalamu Alaikum",
    file:"05_salam.mp3"
},

{
    title:"6. Dua",
    subtitle:"Final Dua",
    file:"06_dua.mp3"
}

];

const tilesContainer = document.getElementById("tiles");
const audio = document.getElementById("audio");
const statusText = document.getElementById("status");

let currentTrack = null;

tracks.forEach((track,index)=>{

    const tile = document.createElement("div");
    tile.className = "tile";

    tile.innerHTML = `
        <div class="glow"></div>
        <div class="tile-title">${track.title}</div>
        <div class="tile-sub">${track.subtitle}</div>
    `;

    tile.onclick = ()=>{
        loadTrack(track.file,tile,track.title,true);
    };

    tilesContainer.appendChild(tile);
});

function clearActive(){
    document.querySelectorAll(".tile").forEach(t=>{
        t.classList.remove("active");
    });
}

function loadTrack(file,tile,title,autoplay=false){

    clearActive();

    if(tile){
        tile.classList.add("active");
    }

    currentTrack = file;

    audio.src = file + "?v=" + Date.now();

    statusText.innerText = "LOADED: " + title;

    audio.load();

    if(autoplay){

        const playPromise = audio.play();

        if(playPromise !== undefined){
            playPromise
            .then(()=>{
                statusText.innerText = "PLAYING: " + title;
            })
            .catch(()=>{
                statusText.innerText = "Tap PLAY if autoplay blocked";
            });
        }
    }
}

function playAudio(){

    if(!currentTrack){
        statusText.innerText = "Select a step first";
        return;
    }

    audio.play();

    statusText.innerText = "PLAYING";
}

function pauseAudio(){
    audio.pause();
    statusText.innerText = "PAUSED";
}

function stopAudio(){
    audio.pause();
    audio.currentTime = 0;
    statusText.innerText = "STOPPED";
}

function preloadAll(){

    tracks.forEach(track=>{
        const a = new Audio();
        a.src = track.file;
        a.preload = "auto";
    });
}

preloadAll();

const params = new URLSearchParams(window.location.search);

const audioParam = params.get("audio");

if(audioParam){

    const found = tracks.find(t=>t.file === audioParam);

    if(found){

        setTimeout(()=>{

            const tileList = document.querySelectorAll(".tile");

            const idx = tracks.findIndex(t=>t.file === audioParam);

            loadTrack(
                found.file,
                tileList[idx],
                found.title,
                true
            );

        },500);
    }
}

</script>

</body>
</html>
