<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Salah Training for Kids </title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Arial Rounded MT Bold', sans-serif;
}

body{
    min-height:100vh;
    background: linear-gradient(135deg,#0f172a,#1e1b4b,#312e81);
    color:white;
    padding:40px 20px;
    overflow-x:hidden;
}

.container{
    max-width:700px;
    margin:auto;
    padding-bottom: 100px;
}

/* THEME HEADER */
.title{
    text-align:center;
    font-size:2.8rem;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:30px;
    font-size: 1.2rem;
}

/* GRID & TILES */
.grid{
    display:grid;
    gap:20px;
}

.tile{
    position:relative;
    border-radius:24px;
    padding:30px;
    cursor:pointer;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border:4px solid transparent;
    backdrop-filter:blur(10px);
    outline: none; /* Removes default browser focus ring */
}

/* TV FOCUS STYLE - Navigating with Remote */
.tile:focus-visible, .tile:hover {
    transform: scale(1.05);
    border-color: #ffffff;
    box-shadow: 0 0 40px rgba(255, 255, 255, 0.6);
    background-color: rgba(255, 255, 255, 0.1);
}

/* Ensures phone touch taps don't lock the heavy TV glow style */
.tile:focus:not(:focus-visible) {
    border-color: transparent;
    box-shadow: none;
    transform: none;
}

.tile.active{
    background-color: rgba(255, 255, 255, 0.2);
    box-shadow: inset 0 0 20px rgba(255,255,255,0.3);
}

.tile h2 { font-size: 1.8rem; margin-bottom: 5px; }
.tile p { font-size: 1.1rem; opacity: 0.9; }

/* SYSTEM CONTROLS AREA */
.controls-area {
    margin-top: 30px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

button {
    padding: 20px;
    border-radius: 20px;
    border: none;
    font-size: 1.2rem;
    font-weight: bold;
    color: white;
    cursor: pointer;
    transition: 0.2s;
    outline: none;
}

button:focus-visible, button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
}

.playBtn{background:#22c55e;}
.stopBtn{background:#ef4444;}
.seqBtn{background:#8b5cf6;}
.loopBtn{background:#3b82f6;}

/* CUSTOM ANIME BRANDING SIGNATURE */
.credits-box {
    margin-top: 60px;
    text-align: center;
}

.author-name {
    display: inline-block;
    font-size: 2.2rem;
    font-weight: 900;
    background: linear-gradient(to right, #f472b6, #38bdf8, #f472b6);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 3s linear infinite;
}

@keyframes shine {
    to { background-position: 200% center; }
}

.status-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.8);
    padding: 15px;
    text-align: center;
    font-size: 1.2rem;
    border-top: 2px solid #38bdf8;
    z-index: 50;
}

/* BACKGROUND BUBBLES ENVIRONMENT */
.bg-bubbles { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
.bubble { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.05); animation: float 15s infinite linear; }
@keyframes float { from { transform: translateY(100vh); } to { transform: translateY(-100vh); } }

audio { display: none; }
</style>
</head>

<body>

<div class="bg-bubbles" id="bubbleMachine"></div>

<div class="container">
    <div class="title">✨ Salah Trainer ✨</div>
 /*   <div class="subtitle">Scan QR • Use Remote • Tap Screen</div> */

    <div class="grid" id="tilesContainer"></div>

    <div class="controls-area">
        <button class="playBtn" id="btn-play" onclick="playAudio()">▶ PLAY / PAUSE</button>
        <button class="stopBtn" id="btn-stop" onclick="stopAudio()">⏹ STOP</button>
        <button class="seqBtn" id="btn-seq" onclick="toggleSequential()">⏭ NEXT STEP: OFF</button>
        <button class="loopBtn" id="btn-loop" onclick="toggleLoop()">🔁 LOOP: OFF</button>
    </div>

    <div class="credits-box">
        <p style="color:#94a3b8; letter-spacing:3px; font-size:0.9rem;">CREATED BY</p>
        <p class="author-name">AMTUN NOOR</p>
        <p style="margin-top:5px; color:#64748b; font-size:0.85rem;">May 2026</p>
    </div>
</div>

<div class="status-bar" id="statusBar">Ready</div>

<audio id="audioPlayer" playsinline></audio>

<script>
const tracks = [
    { title:"🌟 Takbeer", subtitle:"Allahu Akbar", file:"01_takbeer.mp3", color:"#f97316", repeat:1 },
    { title:"💜 Ruku", subtitle:"Repeat 3 Times", file:"02_ruku.mp3", color:"#8b5cf6", repeat:3 },
    { title:"💚 Sajda", subtitle:"Repeat 3 Times", file:"03_sajda.mp3", color:"#10b981", repeat:3 },
    { title:"☀️ Tashahhud", subtitle:"Finger Raised", file:"04_tashahhud.mp3", color:"#f59e0b", repeat:1 },
    { title:"🌈 Salam", subtitle:"Assalamu Alaikum", file:"05_salam.mp3", color:"#ec4899", repeat:2 },
    { title:"🤲 Dua", subtitle:"Final Dua", file:"06_dua.mp3", color:"#06b6d4", repeat:1 }
];

const grid = document.getElementById('tilesContainer');
const audio = document.getElementById('audioPlayer');
const statusBar = document.getElementById('statusBar');

let currentIdx = -1;
let repeatCounter = 0;
let isSequential = false;
let isLooping = false;
let tvFocusIdx = -1;

// 1. GENERATE SYSTEM INTERACTIVE TILES
tracks.forEach((track, i) => {
    const div = document.createElement('div');
    div.className = 'tile';
    div.id = `tile-${i}`;
    div.tabIndex = 0; 
    div.style.backgroundColor = track.color + "44"; 
    div.style.borderColor = track.color;
    
    div.innerHTML = `<h2>${track.title}</h2><p>${track.subtitle}</p>`;
    
    div.onclick = () => {
        tvFocusIdx = i;
        playTrack(i);
    };
    grid.appendChild(div);
});

// 2. REMOTE CONTROL & KEYBOARD HARDWARE NAVIGATION
document.addEventListener('keydown', (e) => {
    const focusable = Array.from(document.querySelectorAll('.tile, button'));
    
    if (e.key === "ArrowDown") {
        e.preventDefault();
        tvFocusIdx = (tvFocusIdx + 1) % focusable.length;
        focusable[tvFocusIdx].focus();
        focusable[tvFocusIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else if (e.key === "ArrowUp") {
        e.preventDefault();
        tvFocusIdx = (tvFocusIdx - 1 + focusable.length) % focusable.length;
        focusable[tvFocusIdx].focus();
        focusable[tvFocusIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else if (e.key === "Enter" || e.key === " ") {
        // If focusing a tile, execute play sequence on selection
        if (document.activeElement.classList.contains('tile')) {
            e.preventDefault();
            const id = parseInt(document.activeElement.id.split('-')[1]);
            playTrack(id);
        }
    }
});

// 3. CORE AUDIO LOADER AND VIEWPORT AUTO-ALIGNMENT
function playTrack(index) {
    currentIdx = index;
    repeatCounter = 0;
    
    document.querySelectorAll('.tile').forEach(t => t.classList.remove('active'));
    const activeTile = document.getElementById(`tile-${index}`);
    if (activeTile) {
        activeTile.classList.add('active');
        activeTile.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    const track = tracks[index];
    audio.src = track.file;
    
    const playPromise = audio.play();
    if (playPromise !== undefined) {
        playPromise.then(() => {
            statusBar.innerHTML = `Playing: ${track.title}`;
        }).catch(() => {
            statusBar.innerHTML = `▶ Tap/Select anywhere to allow Audio Playback`;
        });
    }
}

audio.onended = () => {
    const track = tracks[currentIdx];
    
    // Internal Repeat Logic Loops (e.g. 3x Ruku)
    if (repeatCounter < track.repeat - 1) {
        repeatCounter++;
        audio.currentTime = 0;
        audio.play();
        statusBar.innerHTML = `${track.title} (Repeat ${repeatCounter + 1}/${track.repeat})`;
    } 
    // Sequential Auto Progress Sequence (Next Step)
    else if (isSequential && currentIdx < tracks.length - 1) {
        playTrack(currentIdx + 1);
    }
    // Infinite Single Step Continuous Loop
    else if (isLooping) {
        playTrack(currentIdx);
    }
    else {
        statusBar.innerHTML = "Finished: " + track.title;
        document.getElementById(`tile-${currentIdx}`).classList.remove('active');
    }
};

// 4. DESKTOP/TV CONTROL ACTIONS
function playAudio() {
    if (currentIdx === -1) {
        playTrack(0);
        return;
    }
    if (audio.paused) {
        audio.play();
        statusBar.innerHTML = `Playing: ${tracks[currentIdx].title}`;
    } else {
        audio.pause();
        statusBar.innerHTML = "Paused";
    }
}

function stopAudio() {
    audio.pause();
    audio.currentTime = 0;
    repeatCounter = 0;
    statusBar.innerHTML = "Stopped";
    document.querySelectorAll('.tile').forEach(t => t.classList.remove('active'));
}

function toggleSequential() {
    isSequential = !isSequential;
    isLooping = false;
    updateButtonLabels();
}

function toggleLoop() {
    isLooping = !isLooping;
    isSequential = false;
    updateButtonLabels();
}

function updateButtonLabels() {
    document.getElementById('btn-seq').innerHTML = `⏭ NEXT STEP: ${isSequential ? 'ON' : 'OFF'}`;
    document.getElementById('btn-loop').innerHTML = `🔁 LOOP: ${isLooping ? 'ON' : 'OFF'}`;
}

// THEME GRAPHICS ENVIRONMENT GENERATOR
for(let i=0; i<15; i++){
    const b = document.createElement('div');
    b.className = 'bubble';
    b.style.left = Math.random()*100+"vw";
    b.style.width = b.style.height = (20+Math.random()*60)+"px";
    b.style.animationDelay = Math.random()*5+"s";
    document.getElementById('bubbleMachine').appendChild(b);
}

// INBOUND DEEP QR LINK PARSER ENGINE
const urlParams = new URLSearchParams(window.location.search);
const autoFile = urlParams.get('audio');
if(autoFile) {
    const idx = tracks.findIndex(t => t.file === autoFile);
    if(idx !== -1) {
        setTimeout(() => {
            tvFocusIdx = idx;
            playTrack(idx);
        }, 1000);
    }
}
</script>

</body>
</html>
