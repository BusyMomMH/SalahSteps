<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Salah Training</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Arial Rounded MT Bold',sans-serif;
}

body{
    min-height:100vh;
    background: linear-gradient(135deg,#0f172a,#1e1b4b,#312e81);
    overflow-x:hidden;
    color:white;
    padding:20px;
}

.bg-bubbles{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:-1;
}

.bubble{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    animation:float 12s infinite linear;
}

@keyframes float{
    from{ transform:translateY(100vh) scale(0.8); }
    to{ transform:translateY(-120vh) scale(1.2); }
}

.container{
    max-width:650px;
    margin:auto;
    padding-bottom: 60px;
}

.title{
    text-align:center;
    font-size:2.3rem;
    font-weight:bold;
    margin-bottom:10px;
    animation:pulse 2s infinite;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:25px;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.03);}
    100%{transform:scale(1);}
}

.grid{
    display:grid;
    gap:18px;
}

.tile{
    position:relative;
    overflow:hidden;
    border-radius:24px;
    padding:24px;
    cursor:pointer;
    transition:0.3s;
    border:3px solid transparent;
    backdrop-filter:blur(8px);
    outline: none;
}

/* TV Focus State using native focus-visible to keep touch smart */
.tile:focus-visible, .tile:hover{
    transform:translateY(-5px) scale(1.02);
    border-color: rgba(255, 255, 255, 0.5);
}

.tile:focus:not(:focus-visible) {
    border-color: transparent;
    transform: none;
}

/* Restored exact original glowing pulse effect */
.tile.active{
    border-color:white;
    box-shadow:0 0 25px rgba(255,255,255,0.7);
}

.tile::before{
    content:"";
    position:absolute;
    width:180px;
    height:180px;
    border-radius:50%;
    top:-50px;
    right:-50px;
    background:rgba(255,255,255,0.18);
}

.tile h2{
    font-size:1.4rem;
    margin-bottom:8px;
    position:relative;
}

.tile p{
    position:relative;
    color:#f1f5f9;
    font-size:1rem;
}

/* Controls Grid Setup layout */
.controls{
    margin-top:28px;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

.controls-row-2{
    margin-top:12px;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

button{
    border:none;
    border-radius:18px;
    padding:16px;
    font-size:1rem;
    font-weight:bold;
    color:white;
    cursor:pointer;
    transition:0.2s;
    outline: none;
}

button:focus-visible, button:hover{
    transform:scale(1.05);
    box-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
}

.playBtn{background:#22c55e;}
.stopBtn{background:#ef4444;}
.loopBtn{background:#3b82f6;}
.seqBtn{background:#8b5cf6;}

.status{
    margin-top:20px;
    text-align:center;
    font-size:1rem;
    color:#f8fafc;
    min-height: 24px;
}

/* Custom Animated Credits Section */
.credits-box {
    margin-top: 50px;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 24px;
}

.created-by {
    font-size: 0.85rem;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.author-name {
    display: inline-block;
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 1px;
    background: linear-gradient(to right, #f472b6, #38bdf8, #f472b6);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 3s linear infinite;
    margin: 6px 0;
}

.creation-date {
    font-size: 0.85rem;
    color: #cbd5e1;
}

@keyframes shine {
    to { background-position: 200% center; }
}

audio{ display:none; }
</style>
</head>

<body>

<div class="bg-bubbles"></div>

<div class="container">
    <div class="title">✨ Salah Trainer Kids ✨</div>
    <div class="subtitle">Scan QR • Tap Tile • Learn Salah</div>

    <div class="grid" id="tiles"></div>

    <div class="controls">
        <button class="playBtn" id="btn-play" onclick="playAudio()">▶ Play / Pause</button>
        <button class="stopBtn" id="btn-stop" onclick="stopAudio()">⏹ Stop</button>
    </div>
    <div class="controls-row-2">
        <button class="seqBtn" id="btn-seq" onclick="toggleSequential()">⏭ Next Step: OFF</button>
        <button class="loopBtn" id="btn-loop" onclick="toggleLoop()">🔁 Loop: OFF</button>
    </div>

    <div class="status" id="status">READY</div>

    <div class="credits-box">
        <p class="created-by">Created by</p>
        <p class="author-name">AMTUN NOOR</p>
        <p class="creation-date">May 2026</p>
    </div>
</div>

<audio id="audio" playsinline preload="auto"></audio>

<script>
// Restored your exact original structural colors and tracking profiles
const tracks = [
    { title:"🌟 Takbeer", subtitle:"Allahu Akbar", file:"01_takbeer.mp3", color:"linear-gradient(135deg,#f97316,#fb7185)", repeat:1 },
    { title:"💜 Ruku", subtitle:"Repeat 3 Times", file:"02_ruku.mp3", color:"linear-gradient(135deg,#8b5cf6,#6366f1)", repeat:3 },
    { title:"💚 Sajda", subtitle:"Repeat 3 Times", file:"03_sajda.mp3", color:"linear-gradient(135deg,#10b981,#14b8a6)", repeat:3 },
    { title:"☀️ Tashahhud", subtitle:"Finger Raised", file:"04_tashahhud.mp3", color:"linear-gradient(135deg,#f59e0b,#f97316)", repeat:1 },
    { title:"🌈 Salam", subtitle:"Assalamu Alaikum", file:"05_salam.mp3", color:"linear-gradient(135deg,#ec4899,#8b5cf6)", repeat:2 },
    { title:"🤲 Dua", subtitle:"Final Dua", file:"06_dua.mp3", color:"linear-gradient(135deg,#06b6d4,#3b82f6)", repeat:1 }
];

const tilesContainer = document.getElementById("tiles");
const audio = document.getElementById("audio");
const statusText = document.getElementById("status");

let currentTrackIndex = null;
let currentTrack = null;
let loopMode = false;
let sequentialMode = false;
let repeatCount = 0;
let tvFocusIdx = -1;

// 1. GENERATE TILES (WITH ORIGINAL GRADIENTS)
tracks.forEach((track, index) => {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.tabIndex = 0; 
    tile.style.background = track.color;

    tile.innerHTML = `
        <h2>${track.title}</h2>
        <p>${track.subtitle}</p>
    `;

    tile.onclick = () => {
        tvFocusIdx = index;
        loadTrack(track, index, true);
    };

    tilesContainer.appendChild(tile);
});

function clearActive() {
    document.querySelectorAll(".tile").forEach(tile => {
        tile.classList.remove("active");
    });
}

// 4. LOAD TRACK & AUTO-SCROLL
function loadTrack(track, index, autoplay = false) {
    clearActive();

    const activeTile = document.querySelectorAll(".tile")[index];
    if (activeTile) {
        activeTile.classList.add("active");
        // Smoothly scroll the screen to center the active item
        activeTile.scrollIntoView({ behavior: "smooth", block: "center" });
    }

    currentTrackIndex = index;
    currentTrack = track;
    repeatCount = 0;

    audio.src = track.file + "?v=" + Date.now();
    audio.load();

    statusText.innerHTML = "Loaded: " + track.title;

    if (autoplay) {
        const p = audio.play();
        if (p !== undefined) {
            p.then(() => {
                statusText.innerHTML = "Playing: " + track.title;
            }).catch(() => {
                statusText.innerHTML = "Tap anywhere to allow audio playback";
            });
        }
    }
}

// 2. RUNS REPEATS, TRACK LOOPS, AND SEQUENTIAL PROGRESSION
audio.addEventListener("ended", () => {
    if (!currentTrack) return;

    // A. Handle structural internal loops (e.g., 3x Sajda)
    if (repeatCount < currentTrack.repeat - 1) {
        repeatCount++;
        audio.currentTime = 0;
        audio.play();
        statusText.innerHTML = `${currentTrack.title} • Repeat ${repeatCount + 1}/${currentTrack.repeat}`;
        return;
    }

    // B. Handle Automatic Progression to Next Step
    if (sequentialMode) {
        let nextIndex = currentTrackIndex + 1;
        if (nextIndex < tracks.length) {
            loadTrack(tracks[nextIndex], nextIndex, true);
        } else {
            statusText.innerHTML = "Sequence Completed!";
            clearActive();
        }
        return;
    }

    // C. Handle Whole-Track Loop mode
    if (loopMode) {
        repeatCount = 0;
        audio.currentTime = 0;
        audio.play();
        statusText.innerHTML = "Looping: " + currentTrack.title;
    } else {
        statusText.innerHTML = "Finished: " + currentTrack.title;
    }
});

function playAudio() {
    if (currentTrackIndex === null) {
        loadTrack(tracks[0], 0, true);
        return;
    }
    if (audio.paused) {
        audio.play();
        statusText.innerHTML = "Playing: " + currentTrack.title;
    } else {
        audio.pause();
        statusText.innerHTML = "Paused";
    }
}

function stopAudio() {
    audio.pause();
    audio.currentTime = 0;
    repeatCount = 0;
    statusText.innerHTML = "Stopped";
    clearActive();
}

function toggleLoop() {
    loopMode = !loopMode;
    if (loopMode) {
        sequentialMode = false;
        document.getElementById("btn-seq").innerHTML = "⏭ Next Step: OFF";
    }
    document.getElementById("btn-loop").innerHTML = loopMode ? "🔁 Loop: ON" : "🔁 Loop: OFF";
}

function toggleSequential() {
    sequentialMode = !sequentialMode;
    if (sequentialMode) {
        loopMode = false;
        document.getElementById("btn-loop").innerHTML = "🔁 Loop: OFF";
    }
    document.getElementById("btn-seq").innerHTML = sequentialMode ? "⏭ Next Step: ON" : "⏭ Next Step: OFF";
}

// TV REMOTE COMPATIBLE FOCUS ENGINE CONTROL LISTENER
document.addEventListener('keydown', (e) => {
    const focusable = Array.from(document.querySelectorAll('.tile, button'));
    
    if (e.key === "ArrowDown") {
        e.preventDefault();
        tvFocusIdx = (tvFocusIdx + 1) % focusable.length;
        focusable[tvFocusIdx].focus();
        focusable[tvFocusIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else if (e.key === "ArrowUp") {
        e.preventDefault();
        tvFocusIdx = (tvFocusIdx - 1 + focusable.length) % focusable.length;
        focusable[tvFocusIdx].focus();
        focusable[tvFocusIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
    } else if (e.key === "Enter" || e.key === " ") {
        if (document.activeElement.classList.contains('tile')) {
            e.preventDefault();
            const index = Array.from(document.querySelectorAll('.tile')).indexOf(document.activeElement);
            loadTrack(tracks[index], index, true);
        }
    }
});

// PRELOAD STABILITY
function preloadAll() {
    tracks.forEach(track => {
        const a = new Audio();
        a.src = track.file;
        a.preload = "auto";
    });
}
preloadAll();

// ORIGINAL DECORATIVE BACKGROUND BUBBLES
for(let i=0;i<18;i++){
    const bubble=document.createElement("div");
    bubble.className="bubble";
    bubble.style.left=Math.random()*100+"vw";
    bubble.style.width=bubble.style.height=(30+Math.random()*80)+"px";
    bubble.style.animationDuration=(8+Math.random()*10)+"s";
    bubble.style.opacity=Math.random();
    document.querySelector(".bg-bubbles").appendChild(bubble);
}

// AUTOMATIC DEEP QR CODE ROUTING & SCROLL LINK
const params = new URLSearchParams(window.location.search);
const audioParam = params.get("audio");

if(audioParam){
    const idx = tracks.findIndex(t => t.file === audioParam);
    if(idx !== -1){
        setTimeout(() => {
            tvFocusIdx = idx;
            loadTrack(tracks[idx], idx, true);
        }, 600);
    }
}
</script>

</body>
</html>
