<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Salah Training</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Arial Rounded MT Bold', sans-serif;
}

body{
    height: 100vh;
    width: 100vw;
    /* Spiritual Islamic palette matching the Salah theme */
    background: linear-gradient(135deg, #064e3b, #115e59, #0f172a);
    overflow: hidden; /* Strict limit: Absolutely no scrolling allowed on TV */
    color: white;
    padding: 2vh 2vw;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
}

/* Fallback for mobile devices where scrolling is acceptable */
@media (max-width: 680px) {
    body {
        overflow-y: auto;
        height: auto;
        min-height: 100vh;
    }
}

.bg-bubbles{
    position:absolute;
    inset:0;
    overflow:hidden;
    z-index:0;
    pointer-events: none;
}

.bubble{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.05);
    animation:float 12s infinite linear;
}

@keyframes float{
    from{ transform:translateY(100vh) scale(0.8); }
    to{ transform:translateY(-120vh) scale(1.2); }
}

.app-wrapper {
    z-index: 1;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

.header-section {
    text-align: center;
    height: 10vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.title{
    font-size: clamp(1.8rem, 4vh, 2.8rem);
    font-weight: bold;
    animation: pulseHeading 2s infinite;
}

.subtitle{
    color: #cbd5e1;
    font-size: clamp(0.9rem, 1.8vh, 1.2rem);
    margin-top: 2px;
}

@keyframes pulseHeading{
    0%{transform:scale(1);}
    50%{transform:scale(1.02);}
    100%{transform:scale(1);}
}

/* Widescreen Responsive Grid: Perfectly utilizes 100% space without spilling over */
.grid{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 1.5vw;
    height: 58vh;
    width: 100%;
    margin: 1vh 0;
}

@media (max-width: 680px) {
    .grid {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
        height: auto;
        gap: 15px;
    }
}

.tile{
    position: relative;
    overflow: hidden;
    border-radius: 20px;
    padding: 2vh 2vw;
    cursor: pointer;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    border: 5px solid transparent;
    backdrop-filter: blur(8px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    outline: none; /* Completely disables default browser highlight rings */
}

/* Native D-Pad Focus Visual Indicator (Bypasses Virtual Cursor Mode) */
.tile.focused, .tile:focus-visible {
    transform: scale(1.04);
    border-color: rgba(255, 255, 255, 0.8) !important;
    box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
}

/* Ultra-high visibility pulsing borders for kids when track plays */
.tile.active{
    border: 6px solid #ffffff !important;
    animation: activeGlowPulse 1.5s infinite ease-in-out;
}

@keyframes activeGlowPulse {
    0% { box-shadow: 0 0 15px #fff; transform: scale(1.04); }
    50% { box-shadow: 0 0 40px #fff, inset 0 0 15px rgba(255,255,255,0.4); transform: scale(1.07); }
    100% { box-shadow: 0 0 15px #fff; transform: scale(1.04); }
}

.tile::before{
    content: "";
    position: absolute;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    top: -40px;
    right: -40px;
    background: rgba(255,255,255,0.12);
}

.tile h2{
    font-size: clamp(1.2rem, 3.2vh, 2rem);
    margin-bottom: 4px;
}

.tile p{
    color: #f1f5f9;
    font-size: clamp(0.8rem, 1.8vh, 1.1rem);
}

.footer-controls {
    height: 24vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}

@media (max-width: 680px) {
    .footer-controls { height: auto; gap: 15px; margin-top: 15px; }
}

.controls-cluster {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
}

@media (max-width: 680px) {
    .controls-cluster { grid-template-columns: repeat(2, 1fr); }
}

button{
    border: none;
    border-radius: 16px;
    padding: 1.5vh 1vw;
    font-size: clamp(0.9rem, 2vh, 1.2rem);
    font-weight: bold;
    color: white;
    cursor: pointer;
    transition: transform 0.2s;
    outline: none;
    display: flex;
    align-items: center;
    justify-content: center;
}

button.focused, button:focus-visible {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
    border: 3px solid white;
}

.playBtn{ background: #22c55e; }
.stopBtn{ background: #ef4444; }
.loopBtn{ background: #3b82f6; }
.seqBtn{ background: #8b5cf6; }

.status{
    text-align: center;
    font-size: clamp(1rem, 2.2vh, 1.4rem);
    color: #f8fafc;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
}

/* Static bottom credits area pinned cleanly without eating app real estate */
.credits-box {
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 0.5vh;
    text-align: center;
}

.created-by {
    font-size: clamp(0.6rem, 1.2vh, 0.8rem);
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.author-name {
    display: inline-block;
    font-size: clamp(1.1rem, 2.5vh, 1.6rem);
    font-weight: 900;
    background: linear-gradient(to right, #f472b6, #38bdf8, #f472b6);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shine 3s linear infinite;
}

@keyframes shine { to { background-position: 200% center; } }
audio{ display:none; }
</style>
</head>

<body>

<div class="bg-bubbles" id="bubble-container"></div>

<div class="app-wrapper">
    <!-- Header Section (10% Space) -->
    <div class="header-section">
        <div class="title">✨ Salah Trainer Kids ✨</div>
        <div class="subtitle">Use TV Remote Arrows or Tap Tiles Directly</div>
    </div>

    <!-- Active Working Interactive Grid Area (58% Space) -->
    <div class="grid" id="tiles"></div>

    <!-- Interactive Button Controls and Monitor Strip (24% Space) -->
    <div class="footer-controls">
        <div class="controls-cluster">
            <button class="playBtn" id="btn-play" onclick="playAudio()">▶ Play / Pause</button>
            <button class="stopBtn" id="btn-stop" onclick="stopAudio()">⏹ Stop</button>
            <button class="seqBtn" id="btn-seq" onclick="toggleSequential()">⏭ Next Step: OFF</button>
            <button class="loopBtn" id="btn-loop" onclick="toggleLoop()">🔁 Loop: OFF</button>
        </div>

        <div class="status" id="status">READY</div>

        <!-- Pinned Bottom Metadata Footer Zone -->
        <div class="credits-box">
            <p class="created-by">Created by <span class="author-name">AMTUN NOOR</span> — May 2026</p>
        </div>
    </div>
</div>

<audio id="audio" playsinline preload="auto"></audio>

<script>
const tracks = [
    { title:"🌟 Takbeer", subtitle:"Allahu Akbar", file:"01_takbeer.mp3", color:"linear-gradient(135deg,#f97316,#fb7185)", repeat:1 },
    { title:"💜 Ruku", subtitle:"Repeat 3 Times", file:"02_ruku.mp3", color:"linear-gradient(135deg,#8b5cf6,#6366f1)", repeat:3 },
    { title:"💚 Sajda", subtitle:"Repeat 3 Times", file:"03_sajda.mp3", color:"linear-gradient(135deg,#10b981,#14b8a6)", repeat:3 },
    { title:"☀️ Tashahhud", subtitle:"Finger Raised", file:"04_tashahhud.mp3", color:"linear-gradient(135deg,#f59e0b,#f97316)", repeat:1 },
    { title:"🌈 Salam", subtitle:"Assalamu Alaikum", file:"05_salam.mp3", color:"linear-gradient(135deg,#ec4899,#8b5cf6)", repeat:2 },
    { title:"🤲 Dua", subtitle:"Final Dua", file:"06_dua.mp3", color:"linear-gradient(135deg,#06b6d4,#3b82f6)", repeat:1 }
];

const tilesContainer = document.getElementById("tiles");
const audio = document.getElementById("audio");
const statusText = document.getElementById("status");

let currentTrackIndex = null;
let currentTrack = null;
let loopMode = false;
let sequentialMode = false;
let repeatCount = 0;

// Universal Navigation Array combining Grid and Action Control Buttons
let navigationItems = [];
let activeFocusIndex = 0;

// Draw Tiles
tracks.forEach((track, index) => {
    const tile = document.createElement("div");
    tile.className = "tile";
    tile.style.background = track.color;
    tile.innerHTML = `<h2>${track.title}</h2><p>${track.subtitle}</p>`;
    
    // Smooth compatibility for Touch Screen/Mice
    tile.onclick = () => {
        setNativeFocus(index);
        loadTrack(track, index, true);
    };
    tilesContainer.appendChild(tile);
});

// Build Spatial D-Pad Navigation Node Array Matrix
function mapNavigationNodes() {
    const tiles = Array.from(document.querySelectorAll('.tile'));
    const buttons = [
        document.getElementById('btn-play'),
        document.getElementById('btn-stop'),
        document.getElementById('btn-seq'),
        document.getElementById('btn-loop')
    ];
    navigationItems = [...tiles, ...buttons];
}

function setNativeFocus(index) {
    if (index < 0 || index >= navigationItems.length) return;
    navigationItems[activeFocusIndex].classList.remove('focused');
    activeFocusIndex = index;
    navigationItems[activeFocusIndex].classList.add('focused');
    
    // Explicit browser focus injection (forces TV Bro out of pointer simulation)
    navigationItems[activeFocusIndex].focus();
}

function clearActive() {
    document.querySelectorAll(".tile").forEach(t => t.classList.remove("active"));
}

function loadTrack(track, index, autoplay = false) {
    clearActive();
    const activeTile = document.querySelectorAll(".tile")[index];
    if (activeTile) activeTile.classList.add("active");

    currentTrackIndex = index;
    currentTrack = track;
    repeatCount = 0;

    audio.src = track.file + "?v=" + Date.now();
    audio.load();
    statusText.innerHTML = "Loaded: " + track.title;

    if (autoplay) {
        audio.play().then(() => {
            statusText.innerHTML = "Playing: " + track.title;
        }).catch(() => {
            statusText.innerHTML = "Press Enter/OK to Confirm Sound";
        });
    }
}

// Fixed TV Bro audio lock-up bug: cleans up audio pipes properly on track finish
audio.addEventListener("ended", () => {
    if (!currentTrack) return;

    if (repeatCount < currentTrack.repeat - 1) {
        repeatCount++;
        audio.currentTime = 0;
        audio.play().catch(e => console.log("Audio continuous playback recovery initiated"));
        statusText.innerHTML = `${currentTrack.title} • Repeat ${repeatCount + 1}/${currentTrack.repeat}`;
        return;
    }

    if (sequentialMode) {
        let nextIndex = currentTrackIndex + 1;
        if (nextIndex < tracks.length) {
            setNativeFocus(nextIndex);
            loadTrack(tracks[nextIndex], nextIndex, true);
        } else {
            statusText.innerHTML = "Sequence Completed!";
            clearActive();
        }
        return;
    }

    if (loopMode) {
        repeatCount = 0;
        audio.currentTime = 0;
        audio.play().catch(e => console.log("Loop restart pipeline active"));
        statusText.innerHTML = "Looping: " + currentTrack.title;
    } else {
        statusText.innerHTML = "Finished: " + currentTrack.title;
        // Keep active selection clear so kids can re-navigate freely
    }
});

function playAudio() {
    if (currentTrackIndex === null) { loadTrack(tracks[0], 0, true); return; }
    if (audio.paused) { audio.play(); statusText.innerHTML = "Playing: " + currentTrack.title; } 
    else { audio.pause(); statusText.innerHTML = "Paused"; }
}

function stopAudio() {
    audio.pause();
    audio.currentTime = 0;
    repeatCount = 0;
    statusText.innerHTML = "Stopped";
    clearActive();
}

function toggleLoop() {
    loopMode = !loopMode;
    if (loopMode) { sequentialMode = false; document.getElementById("btn-seq").innerHTML = "⏭ Next Step: OFF"; }
    document.getElementById("btn-loop").innerHTML = loopMode ? "🔁 Loop: ON" : "🔁 Loop: OFF";
}

function toggleSequential() {
    sequentialMode = !sequentialMode;
    if (sequentialMode) { loopMode = false; document.getElementById("btn-loop").innerHTML = "🔁 Loop: OFF"; }
    document.getElementById("btn-seq").innerHTML = sequentialMode ? "⏭ Next Step: ON" : "⏭ Next Step: OFF";
}

// AGGRESSIVE REMOTE CONTROL NAVIGATION ENGINE
// Dynamically handles 3-Column Grid Layout indexing to force instant, precise snaps
document.addEventListener('keydown', (e) => {
    mapNavigationNodes();
    const columns = window.innerWidth > 680 ? 3 : 1;
    
    // Detect if focus is currently inside the grid tiles vs control buttons
    const isGrid = activeFocusIndex < 6;

    if (e.key === "ArrowRight") {
        e.preventDefault();
        if (isGrid) {
            if (activeFocusIndex % 3 < 2 && activeFocusIndex + 1 < 6) setNativeFocus(activeFocusIndex + 1);
        } else {
            if (activeFocusIndex < 9) setNativeFocus(activeFocusIndex + 1);
        }
    } 
    else if (e.key === "ArrowLeft") {
        e.preventDefault();
        if (isGrid) {
            if (activeFocusIndex % 3 > 0) setNativeFocus(activeFocusIndex - 1);
        } else {
            if (activeFocusIndex > 6) setNativeFocus(activeFocusIndex - 1);
        }
    } 
    else if (e.key === "ArrowDown") {
        e.preventDefault();
        if (isGrid) {
            if (activeFocusIndex + 3 < 6) {
                setNativeFocus(activeFocusIndex + 3);
            } else {
                // Snaps directly down from bottom row of grid into the first button
                setNativeFocus(6); 
            }
        }
    } 
    else if (e.key === "ArrowUp") {
        e.preventDefault();
        if (isGrid) {
            if (activeFocusIndex - 3 >= 0) setNativeFocus(activeFocusIndex - 3);
        } else {
            // Snaps directly up from button cluster straight into the bottom-mid tile 
            setNativeFocus(4); 
        }
    } 
    else if (e.key === "Enter" || e.keyCode === 13 || e.key === " ") {
        e.preventDefault();
        // Native trigger injection matching element configuration profiles
        if (isGrid) {
            loadTrack(tracks[activeFocusIndex], activeFocusIndex, true);
        } else {
            navigationItems[activeFocusIndex].click();
        }
    }
});

// Setup Initial App State
window.addEventListener('DOMContentLoaded', () => {
    mapNavigationNodes();
    setNativeFocus(0); // Instantly highlight the first tile so D-pad functions from start
});

// Fallback listener capturing direct URL queries without altering workflows
const params = new URLSearchParams(window.location.search);
const audioParam = params.get("audio");
if(audioParam){
    const idx = tracks.findIndex(t => t.file === audioParam);
    if(idx !== -1){
        setTimeout(() => { setNativeFocus(idx); loadTrack(tracks[idx], idx, true); }, 600);
    }
}

// Generate background bubbles
for(let i=0; i<10; i++){
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.style.left = Math.random()*100+"vw";
    bubble.style.width = bubble.style.height = (40 + Math.random()*60)+"px";
    bubble.style.animationDuration = (10 + Math.random()*10)+"s";
    bubble.style.top = Math.random()*100+"vh";
    document.getElementById("bubble-container").appendChild(bubble);
}
</script>
</body>
</html>
